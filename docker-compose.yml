services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Build Service
  frontend-builder:
    image: node:18
    container_name: frontend-builder
    working_dir: /app
    environment:
      - ADMIN_PATH=${ADMIN_PATH}
      - API_PATH=${API_PATH}
      - HOSTER_URL=${HOSTER_URL}
      - NODE_ENV=production
      - CI=false
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./frontend/scripts:/app/scripts
      - frontend_build:/app/build
      - node_modules_cache:/app/node_modules
    command: /app/docker-entrypoint.sh

  # Service du backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    working_dir: /app
    ports:
      - "${PORT}:3000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/init.js:/app/backend/init.js
      - ./backend/docker-entrypoint.sh:/app/backend/docker-entrypoint.sh
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./.env:/app/.env
      - frontend_build:/app/frontend/build
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/dynamic-routes?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    command: /app/backend/docker-entrypoint.sh
    depends_on:
      - mongodb
      - frontend-builder
    restart: always

  # MCP server — exposes Hoster features to AI agents (Model Context Protocol)
  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: hoster-mcp
    working_dir: /app
    ports:
      - "${MCP_PORT:-3333}:3333"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3333
      - HOSTER_URL=http://backend:3000
      - HOSTER_API_PATH=${API_PATH:-/api}
      - HOSTER_API_KEY=${MCP_HOSTER_API_KEY:-}
      - API_KEY=${API_KEY}
      - MCP_AUTH_KEY=${MCP_AUTH_KEY:-}
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
    driver: local
  frontend_build:
    driver: local
  node_modules_cache:
    driver: local
